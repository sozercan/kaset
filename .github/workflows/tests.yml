name: Test Suite

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

on:
  push:
    branches: [main]
    paths:
      - "**.swift"
      - "Package.swift"
      - "Sources/**"
      - "Tests/**"
      - "Info.plist"
      - "Kaset.entitlements"
      - "Scripts/**"
      - "KasetUITests.xcodeproj/**"
      - "Sources/Kaset/Resources/**"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.swift"
      - "Package.swift"
      - "Sources/**"
      - "Tests/**"
      - "Info.plist"
      - "Kaset.entitlements"
      - "Scripts/**"
      - "KasetUITests.xcodeproj/**"
      - "Sources/Kaset/Resources/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  macos_unit_tests:
    name: macOS Unit Tests
    timeout-minutes: 20
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Cache SPM dependencies
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm/spm-repositories
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Clear SPM binary artifacts cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts

      - name: Run unit tests
        run: swift test -q --skip KasetUITests

  macos_ui_tests:
    name: macOS UI Tests
    timeout-minutes: 30
    runs-on: macos-26
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      UI_TEST_ARTIFACT_NAME: macOS-UITestResults-${{ github.run_attempt }}
      UI_TEST_ISSUE_TITLE: "CI: Full UI Suite failing on main"
      UI_TEST_ISSUE_MARKER: "<!-- kaset-ci-full-ui-suite -->"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache SPM dependencies
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm/spm-repositories
            .build
          key: ${{ runner.os }}-spm-ui-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-ui-

      - name: Clear SPM binary artifacts cache
        run: rm -rf ~/Library/Caches/org.swift.swiftpm/artifacts

      - name: Build app bundle for UI tests
        id: build_ui_app
        env:
          KASET_SIGNING: adhoc
        run: Scripts/build-app.sh debug

      - name: Install app for UI tests
        id: install_ui_app
        run: |
          sudo cp -R .build/app/Kaset.app /Applications/Kaset.app
          # Register with Launch Services so XCUIApplication can find it
          /System/Library/Frameworks/CoreServices.framework/Versions/A/Frameworks/LaunchServices.framework/Versions/A/Support/lsregister -f /Applications/Kaset.app

      - name: Run UI tests
        id: run_ui_tests
        run: |
          set -o pipefail
          xcodebuild \
            -project KasetUITests.xcodeproj \
            -scheme KasetUITests \
            -destination 'platform=macOS' \
            -derivedDataPath ./build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Locate UI test results
        id: locate_ui_results
        if: always()
        run: |
          xcresult_path="$(find ./build -type d -name '*.xcresult' -print | sort | tail -n 1)"
          if [ -n "$xcresult_path" ]; then
            echo "xcresult_path=$xcresult_path" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload test results on failure
        if: failure() && steps.locate_ui_results.outputs.xcresult_path != ''
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v4
        with:
          name: ${{ env.UI_TEST_ARTIFACT_NAME }}
          path: ${{ steps.locate_ui_results.outputs.xcresult_path }}
          retention-days: 7

      - name: Report UI test failure on main
        if: always() && failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UI_BUILD_OUTCOME: ${{ steps.build_ui_app.outcome }}
          UI_INSTALL_OUTCOME: ${{ steps.install_ui_app.outcome }}
          UI_TEST_OUTCOME: ${{ steps.run_ui_tests.outcome }}
          UI_XCRESULT_PATH: ${{ steps.locate_ui_results.outputs.xcresult_path }}
        run: python3 Scripts/ui_test_ci_issue_tracker.py failure

      - name: Close UI failure tracker on recovery
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 Scripts/ui_test_ci_issue_tracker.py success
